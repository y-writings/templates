# yaml-language-server: $schema=./driftline.schema.json
version: 1
$schema: ./driftline.schema.json

files:
  - id: github-workflow-scan
    source: .github/workflows/scan.yaml
    target: .github/workflows/scan.yaml
  - id: github-workflow-semantic-pr
    source: .github/workflows/semantic-pr.yaml
    target: .github/workflows/semantic-pr.yaml
  - id: github-workflow-add-entire-checkpoints-to-pr-body
    source: .github/workflows/add-entire-checkpoints-to-pr-body.yaml
    target: .github/workflows/add-entire-checkpoints-to-pr-body.yaml
  - id: commitlint
    source: .commitlintrc.yaml
    target: .commitlintrc.yaml
  - id: lefthook
    source: lefthook.yaml
    target: lefthook.yaml
  - id: pinact
    source: .pinact.yaml
    target: .pinact.yaml
  - id: mise-baseline
    source: .mise/config.baseline.toml
    target: .mise/config.baseline.toml
  - id: mise-project
    source: .mise/config.toml
    target: .mise/config.toml
    if_not_exists: true
  - id: mise-rc
    source: .miserc.toml
    target: .miserc.toml
  - id: LICENSE
    source: LICENSE
    target: LICENSE
  - id: entire-gitignore
    source: .entire/.gitignore
    target: .entire/.gitignore
  - id: entire-settings-json
    source: .entire/settings.json
    target: .entire/settings.json
  - id: entire-entire-ts
    source: .opencode/plugins/entire.ts
    target: .opencode/plugins/entire.ts
gitignore:
  - .gh
  - .opencode/plugins/entire.ts
