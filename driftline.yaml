version: 1

files:
  - id: github-workflow-entire-checkpoint-collection
    source: .github/workflows/00-entire-checkpoint-collection.yaml
    target: .github/workflows/00-entire-checkpoint-collection.yaml
  - id: github-workflow-security-scan
    source: .github/workflows/00-security-scan.yaml
    target: .github/workflows/00-security-scan.yaml
  - id: github-workflow-semantic-pr-check
    source: .github/workflows/00-semantic-pr-check.yaml
    target: .github/workflows/00-semantic-pr-check.yaml
  - id: github-workflow-weekly-merged-prs-report
    source: .github/workflows/00-weekly-merged-prs-report.yaml
    target: .github/workflows/00-weekly-merged-prs-report.yaml
  - id: commitlint
    source: .commitlintrc.yaml
    target: .commitlintrc.yaml
  - id: lefthook
    source: lefthook.yaml
    target: lefthook.yaml
  - id: pinact
    source: .pinact.yaml
    target: .pinact.yaml
  - id: mise-baseline
    source: .mise/config.baseline.toml
    target: .mise/config.baseline.toml
  - id: mise-project
    source: .mise/config.toml
    target: .mise/config.toml
    if_not_exists: true
  - id: mise-rc
    source: .miserc.toml
    target: .miserc.toml
  - id: LICENSE
    source: LICENSE
    target: LICENSE
  - id: entire-gitignore
    source: .entire/.gitignore
    target: .entire/.gitignore
  - id: entire-settings-json
    source: .entire/settings.json
    target: .entire/settings.json
  - id: entire-entire-ts
    source: .opencode/plugins/entire.ts
    target: .opencode/plugins/entire.ts
gitignore:
  - .gh
  - .opencode/plugins/entire.ts
