# yaml-language-server: $schema=https://raw.githubusercontent.com/y-writings/driftline/main/schema.json
version: 1

files:
  - id: github-workflows
    paths:
      - .github/workflows/00-entire-checkpoint-collection.yaml
      - .github/workflows/00-security-scan.yaml
      - .github/workflows/00-semantic-pr-check.yaml
      - .github/workflows/00-weekly-merged-prs-report.yaml
  - id: commitlint
    paths:
      - .commitlintrc.yaml
  - id: lefthook
    paths:
      - lefthook.yaml
  - id: pinact
    paths:
      - .pinact.yaml
  - id: mise
    paths:
      - .mise/config.baseline.toml
      - .miserc.toml
  - id: mise-project
    paths:
      - .mise/config.toml
    if_not_exists: true
  - id: LICENSE
    paths:
      - LICENSE
  - id: entire
    paths:
      - .entire/.gitignore
      - .entire/settings.json
      - .opencode/plugins/entire.ts
gitignore:
  - .gh
  - .opencode/plugins/entire.ts
