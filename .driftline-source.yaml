# yaml-language-server: $schema=https://raw.githubusercontent.com/y-writings/driftline/main/schema.json
version: 2
files:
  - id: github-workflows
    paths:
      entire-checkpoint-collection:
        path: .github/workflows/00-entire-checkpoint-collection.yaml
      security-scan:
        path: .github/workflows/00-security-scan.yaml
      semantic-pr-check:
        path: .github/workflows/00-semantic-pr-check.yaml
      weekly-merged-prs-report:
        path: .github/workflows/00-weekly-merged-prs-report.yaml
  - id: commitlint
    paths:
      config:
        path: .commitlintrc.yaml
  - id: lefthook
    paths:
      config:
        path: lefthook.yaml
  - id: pinact
    paths:
      config:
        path: .pinact.yaml
  - id: mise
    paths:
      baseline:
        path: .mise/config.baseline.toml
      miserc:
        path: .miserc.toml
  - id: mise-project
    paths:
      config:
        path: .mise/config.toml
  - id: LICENSE
    paths:
      license:
        path: LICENSE
  - id: entire
    paths:
      gitignore:
        path: .entire/.gitignore
      settings:
        path: .entire/settings.json
      opencode-plugin:
        path: .opencode/plugins/entire.ts
gitignore:
  - .gh
  - .opencode/plugins/entire.ts
