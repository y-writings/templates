name: changelog

on:
  workflow_run:
    workflows:
      - weekly-snapshot
    types:
      - completed
  workflow_dispatch:

permissions: {}

concurrency:
  group: changelog-main
  cancel-in-progress: true

jobs:
  update-changelog:
    name: Generate and propose CHANGELOG.md updates
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      OUTPUT: CHANGELOG.md
      GITHUB_REPO: ${{ github.repository }}
    steps:
      - name: Check out repository with full history
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0

      - name: Generate CHANGELOG.md from git history
        id: git-cliff
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 # v4.7.1
        with:
          # Use the checked-in git-cliff configuration for repository history.
          config: cliff.toml
          args: --verbose
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create or update changelog pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          add-paths: |
            CHANGELOG.md
          author: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
          committer: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
          branch: automation/update-changelog
          base: main
          commit-message: "docs(changelog): update changelog"
          delete-branch: true
          title: "docs(changelog): update changelog"
          body: |
            ## Summary
            - regenerate `CHANGELOG.md` from the latest tagged `main` branch history
            - keep weekly snapshot summaries on a dedicated automation branch instead of pushing directly to `main`
