name: Add Entire checkpoints to PR body

on:
  pull_request_target:
    types: [opened, synchronize, edited, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  update-pr-body:
    runs-on: ubuntu-latest
    steps:
      - name: Collect checkpoints and update PR body
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const markerStart = "<!-- entire-checkpoints:start -->";
            const markerEnd = "<!-- entire-checkpoints:end -->";
            const heading = "## Entire checkpoints";

            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;

            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number });
            const currentBody = pr.body || "";

            const query = `
              query($owner: String!, $repo: String!, $pullNumber: Int!, $cursor: String) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $pullNumber) {
                    commits(first: 100, after: $cursor) {
                      pageInfo {
                        hasNextPage
                        endCursor
                      }
                      nodes {
                        commit {
                          message
                        }
                      }
                    }
                  }
                }
              }
            `;

            const messages = [];
            let cursor = null;
            while (true) {
              const res = await github.graphql(query, { owner, repo, pullNumber: pull_number, cursor });
              const commits = res.repository.pullRequest.commits;
              for (const node of commits.nodes) {
                messages.push(node.commit.message || "");
              }
              if (!commits.pageInfo.hasNextPage) break;
              cursor = commits.pageInfo.endCursor;
            }

            const checkpoints = [...new Set(
              messages
                .flatMap((message) => message.split(/\r?\n/))
                .map((line) => line.trim())
                .filter((line) => /^Entire-Checkpoint:\s*\S+/.test(line))
            )].sort((a, b) => a.localeCompare(b));

            const section = [
              markerStart,
              heading,
              "",
              checkpoints.length > 0
                ? checkpoints.map((line) => `- \`${line}\``).join("\n")
                : "_No Entire checkpoints found._",
              markerEnd,
            ].join("\n");

            const escapedStart = markerStart.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
            const escapedEnd = markerEnd.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
            const markerRegex = new RegExp(`${escapedStart}[\\s\\S]*?${escapedEnd}`, "m");

            const updatedBody = markerRegex.test(currentBody)
              ? currentBody.replace(markerRegex, section)
              : `${currentBody.trim()}\n\n${section}`.trim();

            if (updatedBody === currentBody) {
              core.info("PR body already up-to-date.");
              return;
            }

            await github.rest.pulls.update({ owner, repo, pull_number, body: updatedBody });
            core.info(`Updated PR #${pull_number} with ${checkpoints.length} checkpoint(s).`);
