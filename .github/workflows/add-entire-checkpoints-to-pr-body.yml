name: Add Entire checkpoints to PR body

on:
  pull_request_target:
    types: [opened, synchronize, edited, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  update-pr-body:
    runs-on: ubuntu-latest
    steps:
      - name: Collect checkpoints and update PR body
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BODY: ${{ github.event.pull_request.body }}
          API_URL: ${{ github.api_url }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import urllib.request

          marker_start = "<!-- entire-checkpoints:start -->"
          marker_end = "<!-- entire-checkpoints:end -->"
          heading = "## Entire checkpoints"

          repo = os.environ["REPO"]
          pr_number = os.environ["PR_NUMBER"]
          current_body = os.environ.get("PR_BODY") or ""
          api_url = os.environ["API_URL"]
          token = os.environ["GITHUB_TOKEN"]

          def request_json(url: str, method: str = "GET", payload: dict | None = None):
            headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "entire-checkpoints-workflow",
            }
            body = None
            if payload is not None:
              body = json.dumps(payload).encode("utf-8")
              headers["Content-Type"] = "application/json"
            req = urllib.request.Request(url, data=body, headers=headers, method=method)
            with urllib.request.urlopen(req) as res:
              return json.loads(res.read().decode("utf-8"))

          commits = []
          page = 1
          while True:
            url = f"{api_url}/repos/{repo}/pulls/{pr_number}/commits?per_page=100&page={page}"
            chunk = request_json(url)
            if not chunk:
              break
            commits.extend(chunk)
            if len(chunk) < 100:
              break
            page += 1

          checkpoints = sorted({
            line.strip()
            for commit in commits
            for line in (commit.get("commit", {}).get("message", "").splitlines())
            if re.match(r"^Entire-Checkpoint:\s*\S+", line.strip())
          })

          section_lines = [marker_start, heading, ""]
          if checkpoints:
            section_lines.extend([f"- `{line}`" for line in checkpoints])
          else:
            section_lines.append("_No Entire checkpoints found._")
          section_lines.append(marker_end)
          section = "\n".join(section_lines)

          marker_re = re.compile(re.escape(marker_start) + r"[\s\S]*?" + re.escape(marker_end), re.MULTILINE)
          if marker_re.search(current_body):
            updated_body = marker_re.sub(section, current_body)
          else:
            updated_body = (current_body.strip() + "\n\n" + section).strip()

          if updated_body == current_body:
            print("PR body already up-to-date.")
            raise SystemExit(0)

          update_url = f"{api_url}/repos/{repo}/pulls/{pr_number}"
          request_json(update_url, method="PATCH", payload={"body": updated_body})
          print(f"Updated PR #{pr_number} with {len(checkpoints)} checkpoint(s).")
          PY
