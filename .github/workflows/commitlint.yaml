name: commitlint

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: lts/*

      - name: Install commitlint
        run: npm install --global @commitlint/cli@20.5.0

      - name: Lint pushed commits
        if: github.event_name == 'push'
        run: |
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            commitlint --config .commitlintrc.yaml --last --verbose
          else
            commitlint --config .commitlintrc.yaml --from "${{ github.event.before }}" --to "${{ github.sha }}" --verbose
          fi

      - name: Lint pull request commits
        if: github.event_name == 'pull_request'
        run: commitlint --config .commitlintrc.yaml --from "${{ github.event.pull_request.base.sha }}" --to "${{ github.event.pull_request.head.sha }}" --verbose
