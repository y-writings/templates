name: commitlint

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install commitlint
        run: npm install --global @commitlint/cli

      - name: Lint pushed commit
        if: github.event_name == 'push'
        run: commitlint --config .commitlintrc.yaml --last --verbose

      - name: Lint pull request commits
        if: github.event_name == 'pull_request'
        run: commitlint --config .commitlintrc.yaml --from "${{ github.event.pull_request.base.sha }}" --to "${{ github.event.pull_request.head.sha }}" --verbose
