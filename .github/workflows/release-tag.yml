name: release-tag

on:
  push:
    branches:
      - main
    paths:
      - CHANGELOG.md

permissions:
  contents: write

concurrency:
  group: release-tag-main
  cancel-in-progress: false

jobs:
  create-release-tag:
    name: Create release tag after changelog merge
    if: >-
      ${{ github.actor == 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository with full history and tags
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Derive release tag from merge commit
        id: release-tag
        env:
          MERGE_COMMIT_SHA: ${{ github.sha }}
        run: bash scripts/derive-release-tag.sh "${MERGE_COMMIT_SHA}"

      - name: Check whether the GitHub release already exists
        id: release-status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release-tag.outputs.tag }}
        run: |
          if gh release view "${TAG}" > /dev/null 2>&1; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "exists=false" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub release for the merge commit
        if: steps.release-status.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release-tag.outputs.tag }}
          MERGE_COMMIT_SHA: ${{ github.sha }}
        run: |
          if [ -z "${MERGE_COMMIT_SHA}" ]; then
            echo "GitHub did not provide the push commit SHA."
            exit 1
          fi

          gh release create "${TAG}" --target "${MERGE_COMMIT_SHA}" --title "Release ${TAG}" --notes "Release ${TAG}"

      - name: Report existing release
        if: steps.release-status.outputs.exists == 'true'
        env:
          TAG: ${{ steps.release-tag.outputs.tag }}
        run: echo "Release ${TAG} already exists. Skipping release creation."
