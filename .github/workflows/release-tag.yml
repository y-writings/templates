name: weekly-snapshot

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      snapshot_date:
        description: Optional override in YYYY.MM.DD format for manual recovery.
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: weekly-snapshot-main
  cancel-in-progress: false

jobs:
  create-snapshot-tag:
    name: Create weekly snapshot tag on main
    runs-on: ubuntu-latest
    steps:
      - name: Check out main with full history and tags
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0

      - name: Derive weekly snapshot tag
        id: snapshot-tag
        env:
          SNAPSHOT_DATE: ${{ inputs.snapshot_date }}
        run: bash scripts/derive-release-tag.sh

      - name: Create immutable snapshot tag
        if: steps.snapshot-tag.outputs.tag_exists == 'false'
        env:
          TAG: ${{ steps.snapshot-tag.outputs.tag }}
        run: |
          target_sha="$(git rev-parse HEAD)"
          git tag "${TAG}" "${target_sha}"
          git push origin "refs/tags/${TAG}"

      - name: Report existing snapshot tag
        if: steps.snapshot-tag.outputs.tag_exists == 'true'
        env:
          TAG: ${{ steps.snapshot-tag.outputs.tag }}
        run: echo "Snapshot tag ${TAG} already exists. Skipping tag creation."
