# yaml-language-server: $schema=./templates.schema.json
version: 1
$schema: ./templates.schema.json

templates:
  - id: github-workflow-scan
    source: .github/workflows/scan.yaml
    target: .github/workflows/scan.yaml
  - id: github-workflow-semantic-pr
    source: .github/workflows/semantic-pr.yaml
    target: .github/workflows/semantic-pr.yaml
  - id: commitlint
    source: .commitlintrc.yaml
    target: .commitlintrc.yaml
  - id: lefthook
    source: lefthook.yaml
    target: lefthook.yaml
  - id: pinact
    source: .pinact.yaml
    target: .pinact.yaml
  - id: mise-baseline
    source: .mise/config.baseline.toml
    target: .mise/config.baseline.toml
  - id: mise-project
    source: .mise/config.toml
    target: .mise/config.toml
    if_not_exists: true
  - id: mise-rc
    source: .miserc.toml
    target: .miserc.toml
  - id: LICENSE
    source: LICENSE
    target: LICENSE
gitignore:
  - .gh
