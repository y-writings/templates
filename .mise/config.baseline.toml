# config.baseline.toml is the shared governance config.
# Do not edit this file.
# This config is managed at https://github.com/y-writings/templates.

[env]
GH_CONFIG_DIR = "{{config_root}}/.gh"

[tasks."00:setup"]
description = "Reset generated Git hooks and reinstall managed hooks"
run = [
  { task = "00:hooks:reset" },
  "lefthook install",
  "entire enable --agent opencode"
]

[tasks."00:pin"]
description = "Run repository pinning maintenance tasks"
usage = '''
arg "<command>" {
  choices "fix" "update:pinact" "update:docker-pin"
}
'''
run = '''
case "${usage_command?}" in
  fix)               mise run 00:pin:fix ;;
  update:pinact)     mise run 00:pin:update:pinact ;;
  update:docker-pin) mise run 00:pin:update:docker-pin ;;
esac
'''

[tasks."00:pin:fix"]
hide = true
description = "Pin repository references with pinact and dockerfile-pin"
run = ["pinact run --check --fix", "dockerfile-pin run --write"]

[tasks."00:pin:update:pinact"]
hide = true
description = "Update GitHub Actions references with pinact"
run = ["pinact run -update"]

[tasks."00:pin:update:docker-pin"]
hide = true
description = "Update pinned Docker image digests with dockerfile-pin"
run = ["dockerfile-pin run --write --update"]

[tasks."00:scan"]
description = "Scan all repository files with betterleaks"
run = ["betterleaks dir --no-banner --redact=20 ."]

[tasks."00:hooks:reset"]
hide = true
confirm = "This will remove and recreate Git hooks. Continue?"
run = '''
#!/usr/bin/env bash
set -euo pipefail

git rev-parse --is-inside-work-tree >/dev/null
git config --local --unset-all core.hooksPath || true

common_git_dir="$(git rev-parse --path-format=absolute --git-common-dir)"
hooks_dir="$common_git_dir/hooks"
rm -rf -- "$hooks_dir"
mkdir -p -- "$hooks_dir"
'''
