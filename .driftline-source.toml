version = 2

[files.github]
entire-checkpoint-collection = {
  path = ".github/workflows/00-entire-checkpoint-collection.yaml",
  mode = "managed"
}
security-scan = { path = ".github/workflows/00-security-scan.yaml", mode = "managed" }
semantic-pr-check = { path = ".github/workflows/00-semantic-pr-check.yaml", mode = "managed" }
weekly-merged-prs-report = {
  path = ".github/workflows/00-weekly-merged-prs-report.yaml",
  mode = "managed"
}
pull-request-template = { path = ".github/pull_request_template.md", mode = "managed" }

[files.mise]
miserc = { path = ".miserc.toml", mode = "managed" }
baseline-config = { path = ".mise/config.baseline.toml", mode = "managed" }
project-config = { path = ".mise/config.toml", mode = "template" }

[files.configs]
commitlint = { path = ".commitlintrc.yaml", mode = "managed" }
lefthook = { path = "lefthook.yaml", mode = "managed" }
pinact = { path = ".pinact.yaml", mode = "managed" }
tombi = { path = "tombi.toml", mode = "managed" }
cliff = { path = "cliff.toml", mode = "template" }

[files.LICENSE]
license = { path = "LICENSE", mode = "managed" }

[files.entire]
gitignore = { path = ".entire/.gitignore", mode = "managed" }
settings = { path = ".entire/settings.json", mode = "managed" }
opencode-plugin = { path = ".opencode/plugins/entire.ts", mode = "managed" }
